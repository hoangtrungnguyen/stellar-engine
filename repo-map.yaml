# Plane project UUID -> sibling repo mapping for the task-generator agent.
#
# Each project's repo MUST live as a sibling of stellar-engine/, e.g.:
#   /Users/you/IdeaProjects/stellar-engine
#   /Users/you/IdeaProjects/sportbuddies   <- this folder
#
# If the sibling folder is missing, the agent will `git clone` git_url into it.
# Use --no-clone to disable auto-clone.
#
# Example:
#
# projects:
#   "00000000-0000-0000-0000-000000000000":
#     repo_name: sportbuddies
#     git_url: git@github.com:trungnguyenhoang/sportbuddies.git
#     workspace_prefix: SPORT

projects:
  "8af0f117-1dd0-4bfe-8db8-ff131d865534":
    repo_name: sport-buddies-web
    git_url: https://github.com/hoangtrungnguyen/sport-buddies-web.git
    workspace_prefix: WEBINTRO
