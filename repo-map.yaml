# Plane project UUID -> sibling repo mapping for the task-generator agent.
#
# ────────────────────────────────────────────────────────────────────────────
# SCOPE: this file is the task-generator registry only.
#
# Keyed by Plane project UUID; maps to repo metadata (name, git_url,
# workspace_prefix). Consumed by `agents/task-generator/cli/resolve_repo.py`
# to locate (and optionally clone) the sibling repo for a given Plane page.
#
# This is NOT the fleet-runtime registry. When the `se` CLI / stellar-
# orchestrator land (docs/stellar-engine/plan.md §4 Phases B, D), they will
# add a sibling file `repos.yaml` keyed by repo NAME (not Plane UUID) and
# carrying runtime config (poll_interval_seconds, max_concurrent,
# team_routing, etc.). Schemas are intentionally separate. Do not merge.
# ────────────────────────────────────────────────────────────────────────────
#
# Two sources are merged at runtime:
#   1. This root file (legacy / shared overrides)
#   2. `systems/<Name>/system.yaml` (per-system config — preferred)
#
# Per-system files win on conflict. Add new mappings under `systems/<Name>/`
# rather than here whenever possible — keeps each system's spec docs, agent
# config, and Plane wiring co-located. See `systems/SportBuddies/system.yaml`
# for an example.
#
# Each project's repo MUST live as a sibling of stellar-engine/, e.g.:
#   /Users/you/IdeaProjects/stellar-engine
#   /Users/you/IdeaProjects/sport-buddies-web   <- this folder
#
# If the sibling folder is missing, the agent will `git clone` git_url into it.
# Use --no-clone to disable auto-clone.
#
# Example (commented out — prefer copying into systems/<Name>/system.yaml):
#
# projects:
#   "00000000-0000-0000-0000-000000000000":
#     repo_name: my-repo
#     git_url: git@github.com:owner/my-repo.git
#     workspace_prefix: PREFIX

projects:
  # stellar-engine self-hosting: this very repo, mirrored to its own Plane
  # project. Creds for the `stellar-engine` workspace must be supplied via env
  # vars when running the agent against this project, e.g.:
  #
  #   PLANE_WORKSPACE=stellar-engine \
  #   PLANE_API_TOKEN=<your-token>            # never commit a real token
  #     python3 agents/task-generator/cli/run.py \
  #       f0c79297-dc54-4762-9ced-dd5dafa85254 <page_id> --dry-run
  "f0c79297-dc54-4762-9ced-dd5dafa85254":
    repo_name: stellar-engine
    git_url: https://github.com/hoangtrungnguyen/stellar-engine.git
    workspace_prefix: STELENG

  # Stellar-Sandbox — end-to-end test workspace (workspace: stellar-sandbox).
  # Used to validate the full generator → task-generator → grava → Plane sync
  # flow against a real Plane workspace + GitHub repo without touching prod.
  "cec88b42-b47c-4f1c-bfdf-a882c490a784":
    repo_name: stellar-sand-box
    git_url: https://github.com/hoangtrungnguyen/stellar-sanbox-testing.git
    workspace_prefix: STELL
