name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0). Leave empty for a dev build."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            arch: arm64
          - target: darwin-x64
            runner: macos-14
            arch: x64
          - target: linux-x64
            runner: ubuntu-latest
            arch: x64
          - target: linux-arm64
            runner: ubuntu-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: install universal2 Python
        # python.org ships a universal2 (arm64 + x86_64) binary, which
        # PyInstaller's --target-arch flag requires for cross-compile from
        # the arm64 macos-14 runner to x86_64.
        if: runner.os == 'macOS'
        run: |
          PYVER="3.12.7"
          PKG="python-${PYVER}-macos11.pkg"
          curl -fsSL -o "/tmp/${PKG}" "https://www.python.org/ftp/python/${PYVER}/${PKG}"
          sudo installer -pkg "/tmp/${PKG}" -target /
          PY_DIR="/Library/Frameworks/Python.framework/Versions/3.12/bin"
          echo "${PY_DIR}" >> "$GITHUB_PATH"
          "${PY_DIR}/python3" --version
          file "${PY_DIR}/python3"

      - name: resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            v="${{ github.ref_name }}"
          else
            v="$(git describe --tags --always --dirty 2>/dev/null || echo 0.0.0-dev)"
          fi
          echo "SE_VERSION=$v" >> "$GITHUB_ENV"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: build binary
        env:
          SE_TARGET_ARCH: ${{ matrix.arch }}
        run: bash scripts/build.sh --arch ${{ matrix.arch }}

      - name: rename artifacts to match target tag
        # build.sh names by uname + arch. On GitHub Actions runners, uname
        # gives the expected OS, and SE_TARGET_ARCH controls the build arch.
        # If the file already has the target name, skip the move.
        run: |
          cd dist
          TARGET="se-${{ matrix.target }}"
          # Only rename if the file doesn't already have the target name
          shopt -s nullglob
          for f in se-*.tar.gz; do
            if [ "$f" != "$TARGET.tar.gz" ]; then
              mv "$f" "$TARGET.tar.gz"
            fi
          done
          for f in se-*.tar.gz.sha256; do
            if [ "$f" != "$TARGET.tar.gz.sha256" ]; then
              mv "$f" "$TARGET.tar.gz.sha256"
            fi
          done
          # Recompute checksum against tarball (filename appears in the .sha256 file)
          if command -v shasum >/dev/null; then
            shasum -a 256 "$TARGET.tar.gz" > "$TARGET.tar.gz.sha256"
          else
            sha256sum "$TARGET.tar.gz" > "$TARGET.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: se-${{ matrix.target }}
          path: |
            dist/se-${{ matrix.target }}.tar.gz
            dist/se-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec mv {} dist/ \;
          ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/se-darwin-arm64.tar.gz
            dist/se-darwin-arm64.tar.gz.sha256
            dist/se-darwin-x64.tar.gz
            dist/se-darwin-x64.tar.gz.sha256
            dist/se-linux-x64.tar.gz
            dist/se-linux-x64.tar.gz.sha256
            dist/se-linux-arm64.tar.gz
            dist/se-linux-arm64.tar.gz.sha256
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/install.sh \
              | bash -s -- --version ${{ github.ref_name }}
            ```

            Or grab a tarball below:
            - **macOS**: `darwin-arm64` (Apple Silicon) or `darwin-x64` (Intel)
            - **Linux**: `linux-x64` (x86_64) or `linux-arm64` (ARM64)

            Extract `se` onto your PATH.
